<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>petrol calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="form-container">
    <h2>petrol calculator</h2>
    <div class="input-box">
        <input id="cost" type="number" value="1.72">
        <span>cost</span>
    </div>
    <div class="input-box">
        <input id="liters" type="number" value="0">
        <span>Liters</span>
    </div>
    <button class="calculate-btn">result</button>
    <div class="result-box">
        <span>Total:</span>
        <span id="result">0</span>
    </div>
</div>
<script src="script.js" defer></script>
</body>
</html>
