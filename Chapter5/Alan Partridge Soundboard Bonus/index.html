<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Audio Sampler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Audio Sampler</h1>

  <div class="container">

   
    <section class="text-to-speech">
      <h2>Type Here</h2>
      <textarea id="textInput" placeholder="Type something..."></textarea>
      <button id="sayButton">Say it</button>
    </section>

    
    <section class="soundboard">
      <h2 id="bankTitle">Sample Bank 1</h2>

      <div class="grid" id="sampleGrid">
      </div>

      <div class="arrows">
        <button id="leftArrow" class="arrow hidden">←</button>
        <button id="rightArrow" class="arrow">→</button>
      </div>
    </section>

  </div>

  <script src="index.js"></script>
</body>
</html>
