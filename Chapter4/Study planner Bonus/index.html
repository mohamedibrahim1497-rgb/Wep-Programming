<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Planner</title>

    <!-- External CSS file -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Header section -->
    <header>
        <h1>Study Planner  </h1>
    </header>

    <!-- Navigation menu -->
    <nav>
        <ul>
            <li><a href="#">Overview</a></li>
            <li><a href="#">Tasks</a></li>
            <li><a href="#">Progress</a></li>
            <li><a href="#">Resources</a></li>
        </ul>
    </nav>

    <!-- Main content area (3 columns) -->
    <main>

        <!-- Column 1 -->
        <section class="column">
            <h2>Tasks</h2>

            <!-- Demo items -->
            <article class="item">HTML Revision</article>
            <article class="item">CSS Practice</article>
            <article class="item">Flexbox Exercises</article>
            <article class="item">Grid Layout</article>
            <article class="item">Mini Project</article>

            <!-- Required button -->
            <button>Add Task</button>
        </section>

        <!-- Column 2 -->
        <section class="column">
            <h2>Notes</h2>
            <p>Write your study notes here...</p>
        </section>

        <!-- Column 3 -->
        <section class="column">
            <h2>Progress</h2>
            <p>Track your weekly progress here...</p>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>Creative Computing – Web Development Module</p>
    </footer>

</body>
</html>
